<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Kho Hàng - React & Firebase</title>
    <!-- Tải Tailwind CSS để tạo giao diện đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tải React và ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Tải Babel để chuyển đổi JSX sang JS -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Cấu hình Font và Tailwind -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Nội dung ứng dụng React sẽ được render ở đây -->
        <div class="flex justify-center items-center h-screen bg-gray-100">
            <p class="text-lg text-gray-500">Đang tải ứng dụng...</p>
        </div>
    </div>

    <!-- Tải Firebase SDKs -->
    <script type="module">
        // Vui lòng không thay đổi các biến __app_id, __firebase_config, __initial_auth_token
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-inventory-app';

        // Tải các module Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, doc, setDoc, updateDoc, getDoc, addDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Cần truyền các biến này vào mã JSX bằng cách đặt chúng vào window
        window.firebaseDependencies = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, query, onSnapshot, doc, setDoc, updateDoc, getDoc, addDoc, deleteDoc, runTransaction, setLogLevel
        };
        
        window.globalVars = {
            firebaseConfig, initialAuthToken, appId
        };
        
        // Sau khi tất cả các dependency được tải, bắt đầu chạy code React
        const script = document.createElement('script');
        script.type = 'text/babel';
        script.setAttribute('data-type', 'module-script');
        script.textContent = document.getElementById('react-root-script').textContent;
        document.body.appendChild(script);

    </script>
    
    <!-- Code React/JSX -->
    <script type="text/babel" id="react-root-script">
        // Khai báo các hàm và biến toàn cục đã được gán vào window trong script type="module"
        const {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, query, onSnapshot, doc, setDoc, updateDoc, getDoc, addDoc, deleteDoc, runTransaction, setLogLevel
        } = window.firebaseDependencies;
        
        const { firebaseConfig, initialAuthToken, appId } = window.globalVars;

        // Bật debug log cho Firestore
        setLogLevel('Debug');

        // Khởi tạo các biến Firebase (sẽ được gán trong useEffect)
        let db;
        let auth;

        // Hàm tiện ích: Định dạng tiền tệ VND
        const formatCurrency = (amount) => {
            if (typeof amount !== 'number' || isNaN(amount)) return '0 VND';
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        // Hàm tiện ích: Hiện thị thông báo (thay thế cho alert)
        const showCustomAlert = (message) => {
            document.getElementById('custom-alert-message').textContent = message;
            document.getElementById('custom-alert').classList.remove('hidden');
        };

        // Hàm tiện ích: Ẩn thông báo
        const hideCustomAlert = () => {
            document.getElementById('custom-alert').classList.add('hidden');
        };


        // Component chính của ứng dụng
        const App = () => {
            const [isAuthReady, setIsAuthReady] = React.useState(false);
            const [userId, setUserId] = React.useState(null);
            const [currentTab, setCurrentTab] = React.useState('inventory'); // 'inventory', 'stockIn', 'stockOut', 'history'
            const [inventory, setInventory] = React.useState([]);
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            
            const [editTransactionData, setEditTransactionData] = React.useState(null); 

            // --- Khởi tạo Firebase và Authentication ---
            React.useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    // Đăng nhập hoặc đăng nhập ẩn danh
                    const signIn = async () => {
                        try {
                            if (initialAuthToken) {
                                await signInWithCustomToken(auth, initialAuthToken);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (error) {
                            console.error("Lỗi khi đăng nhập Firebase:", error);
                        }
                    };

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            setUserId(user.uid);
                        } else {
                            if (!auth.currentUser) {
                                 signIn();
                            }
                        }
                        setIsAuthReady(true);
                    });

                    signIn();
                } catch (error) {
                    console.error("Lỗi khi khởi tạo Firebase:", error);
                    setIsAuthReady(true);
                }
            }, []);

            // --- Lắng nghe dữ liệu tồn kho và giao dịch theo thời gian thực (onSnapshot) ---
            React.useEffect(() => {
                if (!isAuthReady || !userId) return;

                const inventoryPath = `/artifacts/${appId}/users/${userId}/inventory`;
                const transactionsPath = `/artifacts/${appId}/users/${userId}/transactions`;

                // 1. Lắng nghe tồn kho
                const invQ = query(collection(db, inventoryPath));
                const unsubscribeInv = onSnapshot(invQ, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setInventory(items);
                    setLoading(false);
                }, (error) => {
                    console.error("Lỗi khi đọc tồn kho:", error);
                    setLoading(false);
                });

                // 2. Lắng nghe giao dịch
                const transQ = query(collection(db, transactionsPath));
                const unsubscribeTrans = onSnapshot(transQ, (snapshot) => {
                    const trans = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Sắp xếp theo ngày mới nhất lên đầu
                    trans.sort((a, b) => (b.date.seconds * 1000 + b.date.nanoseconds / 1000000) - (a.date.seconds * 1000 + a.date.nanoseconds / 1000000));
                    setTransactions(trans);
                }, (error) => {
                    console.error("Lỗi khi đọc lịch sử giao dịch:", error);
                });

                // Cleanup function
                return () => {
                    unsubscribeInv();
                    unsubscribeTrans();
                };
            }, [isAuthReady, userId]);

            // --- Tính toán tổng giá trị kho hàng ---
            const totalInventoryValue = React.useMemo(() => {
                return inventory.reduce((total, item) => total + (item.quantity * item.price), 0);
            }, [inventory]);

            // --- Hàm xóa sản phẩm khỏi kho (không phải giao dịch) ---
            const deleteProduct = React.useCallback(async (productId, productName) => {
                if (!db || !userId) return;

                const confirmed = window.confirm(`Bạn có chắc chắn muốn xóa sản phẩm "${productName}" khỏi kho? (Điều này không hoàn tác các giao dịch cũ)`);
                if (!confirmed) return;

                const inventoryPath = `/artifacts/${appId}/users/${userId}/inventory`;
                try {
                    await deleteDoc(doc(db, inventoryPath, productId));
                    showCustomAlert(`Sản phẩm '${productName}' đã bị xóa khỏi kho.`);
                } catch (error) {
                    console.error("Lỗi khi xóa sản phẩm:", error);
                    showCustomAlert("Lỗi: Không thể xóa sản phẩm.");
                }
            }, [userId]);

            // --- Xử lý chức năng Chỉnh sửa giao dịch gần nhất (Hoàn tác và Tải lại form) ---
            const handleEditTransaction = React.useCallback(async (transaction) => {
                if (!db || !userId) return showCustomAlert("Hệ thống chưa sẵn sàng.");

                const transactionRef = doc(db, `/artifacts/${appId}/users/${userId}/transactions`, transaction.id);
                const inventoryPath = `/artifacts/${appId}/users/${userId}/inventory`;

                // 1. Hoàn tác tồn kho trong một Transaction (đảm bảo tính nhất quán)
                try {
                    await runTransaction(db, async (t) => {
                        // PHASE 1: READ (Đọc tất cả các tài liệu cần thiết trước)
                        const productRefsAndDocs = await Promise.all(
                            transaction.items.map(item => {
                                const productRef = doc(db, inventoryPath, item.productId);
                                return t.get(productRef).then(productDoc => ({
                                    productRef,
                                    productDoc,
                                    item,
                                }));
                            })
                        );

                        const updates = [];

                        // PHASE 2: CALCULATE (Tính toán số lượng mới)
                        for (const { productRef, productDoc, item } of productRefsAndDocs) {
                            if (!productDoc.exists()) {
                                console.warn(`Sản phẩm ${item.name} không tồn tại trong kho (ID: ${item.productId}). Bỏ qua hoàn tác tồn kho cho sản phẩm này.`);
                                continue;
                            }

                            const currentQuantity = productDoc.data().quantity;
                            let newQuantity;

                            if (transaction.type === 'IN') {
                                // Nếu là Nhập Kho (IN), phải trừ ngược số lượng đã nhập ra
                                newQuantity = currentQuantity - item.quantity;
                            } else if (transaction.type === 'OUT') {
                                // Nếu là Xuất Kho (OUT), phải cộng ngược số lượng đã xuất vào
                                newQuantity = currentQuantity + item.quantity;
                            }

                            if (newQuantity < 0) {
                                throw new Error(`Tồn kho âm sau khi hoàn tác cho ${item.name}.`);
                            }
                            
                            // Lưu lại cập nhật để thực hiện sau
                            updates.push({ productRef, newQuantity });
                        }

                        // PHASE 3: WRITE (Thực hiện tất cả các lệnh ghi)
                        // 1. Xóa giao dịch gốc
                        t.delete(transactionRef);
                        
                        // 2. Cập nhật tồn kho
                        updates.forEach(({ productRef, newQuantity }) => {
                            t.update(productRef, { quantity: newQuantity });
                        });
                    });
                    
                    // 3. Chuẩn bị dữ liệu để tải lại form (ngoài transaction)
                    const dataToEdit = transaction.items.map(item => ({
                        id: item.productId, // Sử dụng productId làm ID tạm thời cho dòng
                        name: item.name,
                        price: transaction.type === 'IN' ? item.price.toString() : item.costPrice.toString(), // Giá nhập/vốn
                        quantity: item.quantity.toString(),
                        isExisting: true,
                        salePrice: item.salePrice ? item.salePrice.toString() : '' // Chỉ có cho OUT
                    }));

                    setEditTransactionData({ type: transaction.type, items: dataToEdit });
                    
                    // 4. Chuyển đến tab tương ứng
                    if (transaction.type === 'IN') {
                        setCurrentTab('stockIn');
                    } else {
                        setCurrentTab('stockOut');
                    }

                    showCustomAlert(`Đã hoàn tác giao dịch ${transaction.type === 'IN' ? 'Nhập' : 'Xuất'} thành công và tải lại dữ liệu vào form.`);

                } catch (error) {
                    console.error("Lỗi khi hoàn tác giao dịch:", error);
                    showCustomAlert(`Lỗi khi hoàn tác giao dịch: ${error.message || "Đã xảy ra lỗi không xác định."}`);
                }
            }, [userId]);


            // --- Component Phụ: Trang Kho Hàng ---
            const InventoryList = () => (
                <div className="p-4 md:p-8">
                    <h2 className="text-3xl font-bold text-gray-800 mb-6">Kho Hàng Hiện Tại</h2>
                    <div className="bg-gradient-to-r from-blue-500 to-indigo-600 p-5 rounded-xl shadow-lg mb-6 text-white">
                        <p className="text-sm opacity-80">Tổng Giá Trị Kho Hàng (Giá nhập/vốn)</p>
                        <p className="text-4xl font-extrabold mt-1">{formatCurrency(totalInventoryValue)}</p>
                        <p className="text-sm mt-2 opacity-80">Tổng số loại sản phẩm: {inventory.length}</p>
                    </div>

                    {loading ? (
                        <div className="text-center py-10 text-gray-500">Đang tải dữ liệu...</div>
                    ) : inventory.length === 0 ? (
                        <div className="text-center py-10 bg-gray-50 rounded-lg border border-dashed text-gray-500">
                            Kho hàng đang trống. Vui lòng thực hiện *Nhập Kho* để thêm sản phẩm.
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {inventory.map(item => (
                                <div key={item.id} className="flex justify-between items-center bg-white p-4 rounded-lg shadow-md hover:shadow-lg transition duration-200">
                                    <div className="flex-1 min-w-0">
                                        <p className="text-lg font-semibold text-gray-700 truncate">{item.name}</p>
                                        <p className="text-sm text-gray-500">Giá nhập: {formatCurrency(item.price)}</p>
                                    </div>
                                    <div className="text-right ml-4">
                                        <p className="text-xl font-bold text-indigo-700">{item.quantity}</p>
                                        <p className="text-xs text-gray-500">Số lượng tồn</p>
                                    </div>
                                     <button
                                        onClick={() => deleteProduct(item.id, item.name)}
                                        className="ml-4 p-2 bg-red-100 text-red-600 rounded-full hover:bg-red-200 transition"
                                        title="Xóa sản phẩm khỏi kho (Không hoàn tác giao dịch cũ)"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                            <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
                                        </svg>
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            // --- Component Phụ: Trang Nhập Kho (Stock In) ---
            const StockInForm = () => {
                // State để quản lý các dòng nhập kho.
                const [inputItems, setInputItems] = React.useState([]);

                // Hàm khởi tạo/reset form
                const initializeForm = React.useCallback((editData = null) => {
                    if (editData && editData.type === 'IN' && editData.items.length > 0) {
                         // Tải dữ liệu từ giao dịch bị lỗi (Chỉnh sửa)
                        setEditTransactionData(null); // Xóa dữ liệu chỉnh sửa sau khi tải
                        return editData.items.map(item => ({
                            ...item,
                            // Đảm bảo số lượng/giá là string để hiển thị trong input
                            price: item.price.toString(),
                            quantity: item.quantity.toString(),
                            isExisting: true // Giả định là sản phẩm có sẵn khi đang chỉnh sửa
                        }));
                    }

                    // Tạo danh sách mặc định: Sản phẩm có tồn kho + 1 dòng trống
                    const existingItems = inventory
                        .filter(item => item.quantity > 0)
                        .map(item => ({
                            id: item.id,
                            name: item.name,
                            price: item.price.toString(),
                            quantity: '',
                            isExisting: true 
                        }));
                    
                    // Luôn thêm 1 dòng trống cuối cùng để nhập sản phẩm mới
                    return [...existingItems, { id: Date.now().toString(), name: '', price: '', quantity: '', isExisting: false }];
                }, [inventory]);


                // Khởi tạo/Cập nhật danh sách inputItems khi inventory thay đổi
                React.useEffect(() => {
                    // Chỉ chạy lần đầu hoặc khi inventory thay đổi
                    setInputItems(initializeForm(editTransactionData));
                }, [inventory, initializeForm]);


                // Thêm một dòng sản phẩm mới trống (chưa có trong kho)
                const addNewItem = () => {
                    setInputItems(prev => {
                        // Đảm bảo dòng cuối cùng trống và không bị trùng
                        const newId = Date.now().toString();
                        return [...prev.filter(item => item.name || item.quantity), { id: newId, name: '', price: '', quantity: '', isExisting: false }];
                    });
                };

                // Xóa một dòng sản phẩm
                const removeItem = (id) => {
                    setInputItems(prev => {
                        const updatedList = prev.filter(item => item.id !== id);
                        
                        // Nếu xóa dòng trống cuối cùng, phải thêm lại 1 dòng trống để người dùng nhập mới
                        const hasNewEmptyRow = updatedList.some(item => !item.isExisting && !item.name && !item.quantity);
                        if (!hasNewEmptyRow) {
                            return [...updatedList, { id: Date.now().toString(), name: '', price: '', quantity: '', isExisting: false }];
                        }
                        
                        return updatedList;
                    });
                };

                // Cập nhật giá trị cho một trường input cụ thể
                const handleItemChange = (id, field, value) => {
                    setInputItems(prev => prev.map(item => 
                        item.id === id ? { ...item, [field]: value } : item
                    ));
                };

                // Tính tổng tiền nhập kho
                const totalCostIn = React.useMemo(() => {
                    return inputItems.reduce((total, item) => {
                        if (item.quantity && item.price) {
                            const price = parseFloat(item.price) || 0;
                            const qty = parseInt(item.quantity) || 0;
                            return total + (price * qty);
                        }
                        return total;
                    }, 0);
                }, [inputItems]);


                // Hàm xử lý nhập kho
                const handleStockIn = async (e) => {
                    e.preventDefault();
                    if (!db || !userId) return showCustomAlert("Hệ thống chưa sẵn sàng.");

                    // 1. Lọc và xác thực dữ liệu
                    const validItems = inputItems.map(item => {
                        const name = item.name.trim();
                        const price = parseFloat(item.price);
                        const quantity = parseInt(item.quantity);
                        
                        return {
                            ...item,
                            name: name,
                            price: isNaN(price) ? 0 : price,
                            quantity: isNaN(quantity) ? 0 : quantity
                        };
                    }).filter(item => item.name && item.price > 0 && item.quantity > 0);
                    
                    // Loại bỏ các dòng bị trùng tên (giữ lại dòng cuối cùng nhập và cộng dồn số lượng)
                    const uniqueValidItemsMap = new Map();
                    validItems.forEach(item => {
                        const normalizedName = item.name.toLowerCase();
                        const existingProduct = inventory.find(invItem => invItem.name.toLowerCase() === normalizedName);
                        
                        if (uniqueValidItemsMap.has(normalizedName)) {
                            const existing = uniqueValidItemsMap.get(normalizedName);
                            uniqueValidItemsMap.set(normalizedName, {
                                ...existing,
                                quantity: existing.quantity + item.quantity,
                                price: item.price, // Lấy giá nhập của dòng cuối
                            });
                        } else {
                            uniqueValidItemsMap.set(normalizedName, {
                                ...item,
                                id: existingProduct ? existingProduct.id : item.id,
                                originalName: existingProduct ? existingProduct.name : item.name // Giữ lại tên chính xác
                            });
                        }
                    });

                    const finalItemsToProcess = Array.from(uniqueValidItemsMap.values());

                    if (finalItemsToProcess.length === 0) {
                        return showCustomAlert("Vui lòng nhập Tên sản phẩm, Giá nhập và Số lượng hợp lệ (> 0) cho ít nhất một dòng.");
                    }

                    const inventoryPath = `/artifacts/${appId}/users/${userId}/inventory`;
                    const transactionsPath = `/artifacts/${appId}/users/${userId}/transactions`;
                    
                    let totalTransactionValue = 0;
                    const transactionItems = [];
                    const updates = []; // Mảng để lưu trữ các thay đổi cần ghi vào Firestore

                    try {
                        // 2. Xử lý tồn kho trong một Transaction (đảm bảo tính nhất quán)
                        await runTransaction(db, async (t) => {
                            
                            // --- PHASE 1: READ (Đọc tất cả các tài liệu cần thiết trước) ---
                            const productRefsAndDocs = await Promise.all(
                                finalItemsToProcess.map(item => {
                                    // Nếu là sản phẩm mới, không cần đọc (sẽ dùng t.set mới)
                                    if (inventory.some(inv => inv.id === item.id)) {
                                        const productRef = doc(db, inventoryPath, item.id);
                                        return t.get(productRef).then(productDoc => ({
                                            productRef,
                                            productDoc,
                                            item,
                                            isNew: false
                                        }));
                                    } else {
                                        // Sản phẩm mới, giả lập doc.exists() = false
                                        return {
                                            productRef: doc(collection(db, inventoryPath)), // Tạo ref mới
                                            productDoc: { exists: false, data: () => ({}) },
                                            item,
                                            isNew: true
                                        };
                                    }
                                })
                            );

                            // --- PHASE 2: CALCULATE (Tính toán số lượng mới và chuẩn bị các lệnh ghi) ---
                            for (const { productRef, productDoc, item, isNew } of productRefsAndDocs) {
                                const totalValue = item.price * item.quantity;
                                totalTransactionValue += totalValue;

                                let newQuantity;
                                let firestoreId = item.id;

                                if (productDoc.exists) {
                                    // Sản phẩm đã tồn tại: Cập nhật số lượng và giá (giá nhập mới nhất)
                                    const existingData = productDoc.data();
                                    newQuantity = existingData.quantity + item.quantity;
                                    
                                    updates.push({ 
                                        type: 'UPDATE', 
                                        ref: productRef, 
                                        data: {
                                            quantity: newQuantity,
                                            price: item.price // Cập nhật giá nhập mới
                                        }
                                    });
                                    firestoreId = productRef.id;

                                } else {
                                    // Sản phẩm chưa có: Thêm mới
                                    const newProductData = {
                                        name: item.name,
                                        price: item.price,
                                        quantity: item.quantity,
                                        unit: 'Cái' // Mặc định đơn vị
                                    };
                                    
                                    updates.push({
                                        type: 'SET', 
                                        ref: productRef, // Đây là doc ref mới đã tạo ở trên
                                        data: newProductData
                                    });
                                    firestoreId = productRef.id;
                                }

                                // Thêm vào danh sách giao dịch (sử dụng firestoreId đã xác định)
                                transactionItems.push({
                                    productId: firestoreId,
                                    name: item.originalName || item.name,
                                    quantity: item.quantity,
                                    price: item.price, // Giá nhập
                                    totalValue: totalValue
                                });
                            }

                            // --- PHASE 3: WRITE (Thực hiện tất cả các lệnh ghi) ---
                            
                            // 1. Ghi/Cập nhật tồn kho
                            updates.forEach(upd => {
                                if (upd.type === 'UPDATE') {
                                    t.update(upd.ref, upd.data);
                                } else if (upd.type === 'SET') {
                                    t.set(upd.ref, upd.data);
                                }
                            });

                            // 2. Ghi nhận giao dịch nhập kho tổng thể
                            t.set(doc(collection(db, transactionsPath)), {
                                type: "IN",
                                date: new Date(),
                                totalValue: totalTransactionValue,
                                items: transactionItems,
                                description: `Nhập kho cho ${transactionItems.length} loại sản phẩm.`
                            });
                        });

                        showCustomAlert(`Nhập kho thành công! Tổng tiền nhập: ${formatCurrency(totalTransactionValue)}`);
                        
                        // Reset form bằng cách buộc initializeForm chạy lại với inventory mới
                        setInputItems(initializeForm()); 

                    } catch (error) {
                        console.error("Lỗi khi Nhập kho:", error);
                        showCustomAlert("Lỗi: Không thể thực hiện giao dịch Nhập kho.");
                    }
                };

                // Phân tách các dòng nhập liệu
                const existingInputItems = inputItems.filter(item => item.isExisting && item.name); // Có tên là có sẵn
                const newInputItems = inputItems.filter(item => !item.isExisting || !item.name); // Chưa có tên (dòng trống)

                return (
                    <div className="p-4 md:p-8">
                        <h2 className="text-3xl font-bold text-green-700 mb-6 border-b pb-3">Nhập Kho (Stock In)</h2>
                        
                        <form onSubmit={handleStockIn} className="space-y-6">
                            <div className="bg-white p-6 rounded-xl shadow-lg">
                                <h3 className="text-xl font-semibold mb-4 text-gray-700">1. Chi tiết sản phẩm nhập</h3>
                                
                                <div className="space-y-4 max-h-96 overflow-y-auto pr-2 mb-4">
                                    {/* Header cột */}
                                    <div className="grid grid-cols-10 gap-2 font-medium text-xs text-gray-500 border-b pb-2 sticky top-0 bg-white z-[2]">
                                        <span className="col-span-4">Tên Sản Phẩm</span>
                                        <span className="col-span-3 text-right">Giá Nhập Mới (VND)</span>
                                        <span className="col-span-2 text-right">Số Lượng Nhập</span>
                                        <span className="col-span-1 text-center">Xóa</span>
                                    </div>
                                    
                                    {/* Nhóm 1: Sản phẩm có sẵn trong kho (Có tồn kho) */}
                                    {existingInputItems.length > 0 && (
                                        <>
                                            <div className="col-span-10 text-sm font-bold text-indigo-600 bg-indigo-50 p-2 rounded-md">
                                                Sản Phẩm Đã Có Tồn Kho:
                                            </div>
                                            {existingInputItems.map(item => (
                                                <div key={item.id} className="grid grid-cols-10 gap-2 items-center p-2 rounded-md bg-green-50/50 border-l-4 border-green-300">
                                                    {/* Tên Sản Phẩm - Đã khóa */}
                                                    <div className="col-span-4">
                                                        <p className="font-semibold text-sm text-gray-800">{item.name}</p>
                                                        <p className="text-xs text-gray-500">Tồn: {inventory.find(inv => inv.id === item.id)?.quantity || 0}</p>
                                                    </div>
                                                    
                                                    {/* Giá Nhập */}
                                                    <div className="col-span-3">
                                                        <input
                                                            type="number"
                                                            value={item.price}
                                                            onChange={(e) => handleItemChange(item.id, 'price', e.target.value)}
                                                            min="1"
                                                            placeholder="Giá nhập mới"
                                                            className="w-full px-2 py-1 border rounded-md text-sm text-right focus:ring-green-500 focus:border-green-500"
                                                            required
                                                        />
                                                    </div>
                                                    
                                                    {/* Số Lượng Nhập */}
                                                    <div className="col-span-2">
                                                        <input
                                                            type="number"
                                                            value={item.quantity}
                                                            onChange={(e) => handleItemChange(item.id, 'quantity', e.target.value)}
                                                            min="1"
                                                            placeholder="SL Nhập"
                                                            className="w-full px-2 py-1 border rounded-md text-sm text-right focus:ring-green-500 focus:border-green-500"
                                                        />
                                                    </div>
                                                    
                                                    {/* Xóa - Không cho phép xóa sản phẩm có sẵn */}
                                                    <div className="col-span-1 flex justify-center">
                                                        <span className="text-gray-300" title="Không thể xóa dòng sản phẩm có sẵn">
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    )}
                                    
                                    {/* Nhóm 2: Sản phẩm mới (Chưa có tên/Mới nhập) */}
                                    {newInputItems.length > 0 && (
                                        <>
                                            <div className="col-span-10 text-sm font-bold text-gray-600 bg-gray-100 p-2 rounded-md mt-4">
                                                Nhập Sản Phẩm Mới:
                                            </div>
                                            {newInputItems.map((item, index) => (
                                                <div key={item.id} className="grid grid-cols-10 gap-2 items-center p-2 rounded-md bg-yellow-50/50 border-l-4 border-yellow-300">
                                                    {/* Tên Sản Phẩm - Nhập tự do */}
                                                    <div className="col-span-4">
                                                        <input
                                                            type="text"
                                                            value={item.name}
                                                            onChange={(e) => handleItemChange(item.id, 'name', e.target.value)}
                                                            placeholder="Tên sản phẩm"
                                                            className="w-full px-2 py-1 border rounded-md text-sm focus:ring-yellow-500 focus:border-yellow-500"
                                                            required={item.quantity || item.price}
                                                        />
                                                    </div>
                                                    
                                                    {/* Giá Nhập */}
                                                    <div className="col-span-3">
                                                        <input
                                                            type="number"
                                                            value={item.price}
                                                            onChange={(e) => handleItemChange(item.id, 'price', e.target.value)}
                                                            min="1"
                                                            placeholder="Giá nhập"
                                                            className="w-full px-2 py-1 border rounded-md text-sm text-right focus:ring-yellow-500 focus:border-yellow-500"
                                                            required={item.name || item.quantity}
                                                        />
                                                    </div>
                                                    
                                                    {/* Số Lượng */}
                                                    <div className="col-span-2">
                                                        <input
                                                            type="number"
                                                            value={item.quantity}
                                                            onChange={(e) => handleItemChange(item.id, 'quantity', e.target.value)}
                                                            min="1"
                                                            placeholder="SL"
                                                            className="w-full px-2 py-1 border rounded-md text-sm text-right focus:ring-yellow-500 focus:border-yellow-500"
                                                            required={item.name || item.price}
                                                        />
                                                    </div>
                                                    
                                                    {/* Xóa */}
                                                    <div className="col-span-1 flex justify-center">
                                                        <button
                                                            type="button"
                                                            onClick={() => removeItem(item.id)}
                                                            className="p-1 text-red-500 hover:text-red-700 transition"
                                                            title="Xóa dòng sản phẩm này"
                                                        >
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                                <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
                                                            </svg>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    )}
                                </div>

                                <button
                                    type="button"
                                    onClick={addNewItem}
                                    className="w-full mt-4 flex items-center justify-center py-2 px-4 border border-green-300 rounded-lg text-sm font-medium text-green-700 bg-green-50 hover:bg-green-100 transition"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                                        <path fillRule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clipRule="evenodd" />
                                    </svg>
                                    Thêm Dòng Nhập Liệu
                                </button>
                            </div>

                            <div className="bg-green-50 p-6 rounded-xl shadow-xl border border-green-300">
                                <h3 className="text-xl font-semibold mb-4 text-green-700">2. Tổng Kết Phiếu Nhập</h3>
                                <div className="flex justify-between items-center mb-6 border-t pt-4">
                                    <p className="text-2xl font-bold text-gray-800">TỔNG TIỀN NHẬP KHO:</p>
                                    <p className="text-3xl font-extrabold text-green-700">{formatCurrency(totalCostIn)}</p>
                                </div>

                                <button
                                    type="submit"
                                    className="w-full flex justify-center py-3 px-4 rounded-lg shadow-lg text-base font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-150 ease-in-out"
                                >
                                    Xác Nhận Nhập Kho (Nhiều Sản Phẩm)
                                </button>
                            </div>
                        </form>
                    </div>
                );
            };

            // --- Component Phụ: Trang Xuất Kho (Stock Out) ---
            const StockOutForm = () => {
                const [selectedItems, setSelectedItems] = React.useState({}); // {productId: {quantity: N, price: P}}
                const [salePrice, setSalePrice] = React.useState({}); // {productId: SalePrice}

                // Hàm khởi tạo/reset form xuất kho
                const initializeOutForm = React.useCallback((editData = null) => {
                    const initialSelected = {};
                    const initialSalePrice = {};

                    if (editData && editData.type === 'OUT' && editData.items.length > 0) {
                        // Tải dữ liệu từ giao dịch bị lỗi (Chỉnh sửa)
                        editData.items.forEach(item => {
                            const product = inventory.find(i => i.id === item.id);
                            if (product) {
                                initialSelected[item.id] = {
                                    quantity: parseInt(item.quantity),
                                    price: parseFloat(item.price) // Giá vốn
                                };
                                initialSalePrice[item.id] = parseFloat(item.salePrice);
                            }
                        });
                        setEditTransactionData(null); // Xóa dữ liệu chỉnh sửa sau khi tải
                    }

                    setSelectedItems(initialSelected);
                    setSalePrice(initialSalePrice);
                }, [inventory]);

                // Effect để tải dữ liệu chỉnh sửa khi có
                React.useEffect(() => {
                    initializeOutForm(editTransactionData);
                }, [inventory, editTransactionData, initializeOutForm]);


                const handleQuantityChange = (productId, newQty) => {
                    const qty = parseInt(newQty) || 0;
                    if (qty < 0) return;

                    const product = inventory.find(i => i.id === productId);
                    if (!product) return; // Bảo vệ: sản phẩm không tồn tại

                    // Lấy tồn kho hiện tại 
                    const inventoryItem = inventory.find(i => i.id === productId);
                    const currentStock = inventoryItem ? inventoryItem.quantity : 0;

                    if (qty > currentStock) {
                        showCustomAlert(`Số lượng xuất không thể vượt quá tồn kho hiện tại (${currentStock}).`);
                        // Giữ nguyên giá trị cũ nếu vượt quá tồn kho
                        return;
                    }

                    setSelectedItems(prev => ({
                        ...prev,
                        [productId]: { 
                            ...prev[productId],
                            quantity: qty,
                            price: product.price // Lưu giá vốn để tính toán giá trị kho
                        }
                    }));
                    
                    // Xóa khỏi selectedItems nếu số lượng là 0
                    if (qty === 0) {
                        setSelectedItems(prev => {
                            const newItems = { ...prev };
                            delete newItems[productId];
                            return newItems;
                        });
                    }
                };
                
                const handleSalePriceChange = (productId, newPrice) => {
                    const price = parseFloat(newPrice) || 0;
                    if (price < 0) return;
                    setSalePrice(prev => ({ ...prev, [productId]: price }));
                };

                // Tính tổng tiền thu được (Tổng tiền bán)
                const totalRevenue = React.useMemo(() => {
                    return Object.keys(selectedItems).reduce((total, productId) => {
                        const qty = selectedItems[productId].quantity;
                        const price = salePrice[productId] || 0; 
                        return total + (qty * price);
                    }, 0);
                }, [selectedItems, salePrice]);

                // Tính tổng giá vốn (cho giao dịch)
                const totalCostOfGoodsSold = React.useMemo(() => {
                    return Object.keys(selectedItems).reduce((total, productId) => {
                        const qty = selectedItems[productId].quantity;
                        const costPrice = selectedItems[productId].price; // Giá vốn đã lưu
                        return total + (qty * costPrice);
                    }, 0);
                }, [selectedItems]);
                
                const productsToDisplay = React.useMemo(() => 
                    inventory.filter(item => item.quantity > 0 || selectedItems[item.id]?.quantity > 0)
                , [inventory, selectedItems]); 

                // Hàm xử lý xuất kho
                const handleStockOut = async () => {
                    if (!db || !userId) return showCustomAlert("Hệ thống chưa sẵn sàng.");
                    
                    const itemsToOut = Object.keys(selectedItems).filter(id => selectedItems[id].quantity > 0);
                    if (itemsToOut.length === 0) return showCustomAlert("Vui lòng chọn ít nhất một sản phẩm để xuất kho.");
                    
                    let allPricesValid = true;
                    for (const id of itemsToOut) {
                        if (!salePrice[id] || salePrice[id] <= 0) {
                            allPricesValid = false;
                            break;
                        }
                    }

                    if (!allPricesValid) return showCustomAlert("Vui lòng nhập Giá Bán hợp lệ (> 0) cho tất cả sản phẩm xuất.");

                    const inventoryPath = `/artifacts/${appId}/users/${userId}/inventory`;
                    const transactionsPath = `/artifacts/${appId}/users/${userId}/transactions`;

                    try {
                         // 1. Cập nhật tồn kho và tạo giao dịch trong một Transaction
                        const transactionItems = [];
                        const updates = []; // Mảng lưu trữ các thay đổi cần ghi
                        
                        await runTransaction(db, async (t) => {
                            
                            // --- PHASE 1: READ (Đọc tất cả các tài liệu cần thiết trước) ---
                            const productRefsAndDocs = await Promise.all(
                                itemsToOut.map(productId => {
                                    const productRef = doc(db, inventoryPath, productId);
                                    return t.get(productRef).then(productDoc => ({
                                        productRef,
                                        productDoc,
                                        productId
                                    }));
                                })
                            );
                            
                            // --- PHASE 2: CALCULATE (Tính toán số lượng mới và chuẩn bị lệnh ghi) ---
                            for (const { productRef, productDoc, productId } of productRefsAndDocs) {
                                
                                if (!productDoc.exists()) throw new Error(`Sản phẩm với ID ${productId} không tồn tại.`);

                                const productData = productDoc.data();
                                const qtyOut = selectedItems[productId].quantity;
                                const priceSale = salePrice[productId];
                                
                                // Kiểm tra lại tồn kho
                                if (productData.quantity < qtyOut) {
                                     throw new Error(`Tồn kho của ${productData.name} không đủ.`);
                                }

                                // Tính toán số lượng tồn kho mới
                                const newQuantity = productData.quantity - qtyOut;

                                // Lưu lại cập nhật
                                updates.push({
                                    ref: productRef,
                                    data: { quantity: newQuantity }
                                });
                                
                                // Thêm vào danh sách giao dịch
                                transactionItems.push({
                                    productId: productId,
                                    name: productData.name,
                                    quantity: qtyOut,
                                    costPrice: productData.price, // Giá vốn
                                    salePrice: priceSale, // Giá bán
                                    totalRevenue: qtyOut * priceSale
                                });
                            }
                            
                            // --- PHASE 3: WRITE (Thực hiện tất cả các lệnh ghi) ---
                            
                            // 1. Cập nhật tồn kho
                            updates.forEach(upd => {
                                t.update(upd.ref, upd.data);
                            });

                            // 2. Ghi nhận giao dịch xuất kho tổng thể
                            t.set(doc(collection(db, transactionsPath)), {
                                type: "OUT",
                                date: new Date(),
                                totalRevenue: totalRevenue,
                                totalCostOfGoodsSold: totalCostOfGoodsSold,
                                items: transactionItems,
                                description: `Xuất kho bán hàng cho ${transactionItems.length} loại sản phẩm.`
                            });
                        });
                        
                        showCustomAlert(`Xuất kho thành công! Tổng tiền thu được: ${formatCurrency(totalRevenue)}`);
                        setSelectedItems({});
                        setSalePrice({});

                    } catch (error) {
                        console.error("Lỗi khi Xuất kho:", error);
                        showCustomAlert(`Lỗi: Không thể thực hiện giao dịch Xuất kho. ${error.message}`);
                    }
                };

                return (
                    <div className="p-4 md:p-8">
                        <h2 className="text-3xl font-bold text-red-700 mb-6 border-b pb-3">Xuất Kho (Stock Out)</h2>
                        
                        {productsToDisplay.length === 0 && inventory.length > 0 && (
                            <div className="text-center py-10 bg-gray-50 rounded-lg border border-dashed text-gray-500">
                                Tất cả sản phẩm trong kho đang tạm thời hết hàng.
                            </div>
                        )}

                        {inventory.length === 0 && (
                             <div className="text-center py-10 bg-gray-50 rounded-lg border border-dashed text-gray-500">
                                Kho hàng trống. Vui lòng nhập kho trước khi xuất.
                            </div>
                        )}
                        
                        {productsToDisplay.length > 0 && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-xl shadow-lg">
                                    <h3 className="text-xl font-semibold mb-4 text-gray-700">1. Chọn Sản Phẩm và Giá Bán</h3>
                                    <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                                        {/* Header cột */}
                                        <div className="grid grid-cols-5 gap-3 font-medium text-xs text-gray-500 border-b pb-2 sticky top-0 bg-white z-[2] mb-2">
                                            <span className="col-span-2">Tên Sản Phẩm (Giá Vốn)</span>
                                            <span className="col-span-1 text-right">Tồn Kho</span>
                                            <span className="col-span-1 text-right">SL Xuất</span>
                                            <span className="col-span-1 text-right">Giá Bán (VND)</span>
                                        </div>
                                        
                                        {productsToDisplay.map(item => {
                                            const qtyOut = selectedItems[item.id]?.quantity || '';
                                            const priceSale = salePrice[item.id] || '';
                                            const displayQuantity = item.quantity;
                                            
                                            // Đánh dấu sản phẩm đã được chọn
                                            const isSelected = !!selectedItems[item.id];

                                            return (
                                                <div key={item.id} className={`grid grid-cols-5 gap-3 items-center p-3 border rounded-lg transition duration-100 ${isSelected ? 'bg-red-50 border-red-300 shadow-sm' : 'bg-white border-gray-200 hover:bg-gray-50'}`}>
                                                    <div className="col-span-2">
                                                        <p className="font-medium text-gray-800">{item.name}</p>
                                                        <p className="text-xs text-blue-500">Vốn: {formatCurrency(item.price)}</p>
                                                    </div>
                                                    <div className="col-span-1 text-right">
                                                        <p className="text-sm font-semibold text-gray-700">{displayQuantity}</p>
                                                    </div>
                                                    <div className="col-span-1">
                                                        <input
                                                            type="number"
                                                            value={qtyOut}
                                                            onChange={(e) => handleQuantityChange(item.id, e.target.value)}
                                                            min="0"
                                                            max={displayQuantity}
                                                            placeholder="SL"
                                                            className="w-full px-2 py-1 border rounded-md text-sm text-right focus:ring-red-500 focus:border-red-500"
                                                        />
                                                    </div>
                                                    <div className="col-span-1">
                                                        <input
                                                            type="number"
                                                            value={priceSale}
                                                            onChange={(e) => handleSalePriceChange(item.id, e.target.value)}
                                                            min="1"
                                                            placeholder="Giá Bán"
                                                            disabled={!isSelected}
                                                            required={isSelected}
                                                            className={`w-full px-2 py-1 border rounded-md text-sm text-right focus:ring-red-500 focus:border-red-500 ${!isSelected ? 'bg-gray-100 text-gray-500' : ''}`}
                                                        />
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="bg-red-50 p-6 rounded-xl shadow-xl border border-red-300">
                                    <h3 className="text-xl font-semibold mb-4 text-red-700">2. Tổng Kết Giao Dịch</h3>
                                    <div className="flex justify-between items-center mb-4">
                                        <p className="text-lg font-medium text-gray-600">Tổng Số Lượng Xuất:</p>
                                        <p className="text-xl font-bold text-red-600">
                                            {Object.keys(selectedItems).reduce((sum, id) => sum + selectedItems[id].quantity, 0)}
                                        </p>
                                    </div>
                                    <div className="flex justify-between items-center mb-6 border-t pt-4">
                                        <p className="text-2xl font-bold text-gray-800">TỔNG TIỀN THU ĐƯỢC:</p>
                                        <p className="text-3xl font-extrabold text-red-700">{formatCurrency(totalRevenue)}</p>
                                    </div>

                                    <button
                                        onClick={handleStockOut}
                                        disabled={Object.keys(selectedItems).length === 0 || totalRevenue === 0}
                                        className="w-full flex justify-center py-3 px-4 rounded-lg shadow-lg text-base font-medium text-white bg-red-600 hover:bg-red-700 disabled:bg-red-400 transition duration-150 ease-in-out"
                                    >
                                        Xác Nhận Xuất Kho & Thanh Toán
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- Component Phụ: Trang Lịch Sử ---
            const HistoryList = () => {
                const latestTransaction = transactions.length > 0 ? transactions[0] : null;

                return (
                    <div className="p-4 md:p-8">
                        <h2 className="text-3xl font-bold text-gray-800 mb-6">Lịch Sử Giao Dịch</h2>
                        
                        {transactions.length === 0 ? (
                            <div className="text-center py-10 bg-gray-50 rounded-lg border border-dashed text-gray-500">
                                Chưa có giao dịch nào được ghi nhận.
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {transactions.map((t, index) => {
                                    const isOut = t.type === 'OUT';
                                    const bgColor = isOut ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200';
                                    const typeText = isOut ? 'Xuất Kho' : 'Nhập Kho';
                                    const totalValue = isOut ? t.totalRevenue : t.totalValue;
                                    const totalLabel = isOut ? 'Tổng Thu' : 'Tổng Nhập';
                                    
                                    // Chỉ cho phép chỉnh sửa giao dịch mới nhất
                                    const isLatest = index === 0; 
                                    
                                    return (
                                        <div key={t.id} className={`p-4 rounded-xl shadow-md border ${bgColor}`}>
                                            <div className="flex justify-between items-start mb-2 border-b pb-2">
                                                <div>
                                                    <span className={`px-3 py-1 text-sm font-semibold rounded-full ${isOut ? 'text-red-700 bg-red-200' : 'text-green-700 bg-green-200'}`}>
                                                        {typeText}
                                                    </span>
                                                    <p className="text-xs text-gray-500 mt-1">
                                                        {new Date(t.date.seconds * 1000).toLocaleString('vi-VN')}
                                                    </p>
                                                </div>
                                                <div className="text-right flex items-center space-x-3">
                                                    {isLatest && (
                                                        <button
                                                            onClick={() => handleEditTransaction(t)}
                                                            title="Chỉnh sửa (Hoàn tác và Tải lại form)"
                                                            className="p-2 rounded-full text-indigo-600 bg-indigo-100 hover:bg-indigo-200 transition"
                                                        >
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zm-1.88 5.626l-7 7A1 1 0 014 16H3v-1l7-7 1.414 1.414z" />
                                                            </svg>
                                                        </button>
                                                    )}
                                                    <div>
                                                        <p className="text-sm text-gray-600">{totalLabel}:</p>
                                                        <p className={`text-xl font-bold ${isOut ? 'text-red-600' : 'text-green-600'}`}>{formatCurrency(totalValue)}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-sm text-gray-600">
                                                <p className="font-semibold mb-1">Chi tiết ({t.items.length} loại sản phẩm):</p>
                                                <ul className="list-disc pl-5 space-y-1">
                                                    {t.items.map((item, itemIndex) => (
                                                        <li key={itemIndex} className="text-xs text-gray-600">
                                                            {item.name} - SL: {item.quantity} - {isOut ? `Giá bán: ${formatCurrency(item.salePrice)}` : `Giá nhập: ${formatCurrency(item.price)}`}
                                                            {isOut && <span className="ml-2 text-red-500"> (Thu: {formatCurrency(item.totalRevenue)})</span>}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                );
            };

            // --- Render Nội dung theo Tab ---
            const renderContent = () => {
                if (!isAuthReady) {
                    return (
                        <div className="flex justify-center items-center h-full min-h-[400px] text-gray-500">
                            <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Đang kết nối hệ thống...
                        </div>
                    );
                }

                switch (currentTab) {
                    case 'inventory':
                        return <InventoryList />;
                    case 'stockIn':
                        return <StockInForm />;
                    case 'stockOut':
                        return <StockOutForm />;
                    case 'history':
                        return <HistoryList />;
                    default:
                        return <InventoryList />;
                }
            };

            const navItems = [
                { id: 'inventory', label: 'Kho Hàng', color: 'indigo' },
                { id: 'stockIn', label: 'Nhập Kho', color: 'green' },
                { id: 'stockOut', label: 'Xuất Kho', color: 'red' },
                { id: 'history', label: 'Lịch Sử', color: 'gray' },
            ];

            return (
                <div className="min-h-screen bg-gray-100 font-sans antialiased flex flex-col">
                    {/* Custom Alert Modal */}
                    <div id="custom-alert" className="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden" onClick={hideCustomAlert}>
                        <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4" onClick={e => e.stopPropagation()}>
                            <p id="custom-alert-message" className="text-gray-800 text-lg font-medium mb-4 text-center"></p>
                            <button onClick={hideCustomAlert} className="w-full py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">Đóng</button>
                        </div>
                    </div>

                    {/* Header và Tab Navigation */}
                    <header className="bg-white shadow-md sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
                            <h1 className="text-2xl font-extrabold text-gray-900">
                                <span className="text-indigo-600">i</span>NVENTORY <span className="text-sm font-medium ml-2 text-gray-500">Quản Lý Kho v1.0</span>
                            </h1>
                        </div>
                        <nav className="bg-gray-50 border-t border-gray-200">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div className="flex space-x-4 overflow-x-auto">
                                    {navItems.map(item => (
                                        <button
                                            key={item.id}
                                            onClick={() => setCurrentTab(item.id)}
                                            className={`py-3 px-4 text-sm font-medium border-b-2 transition duration-150 ease-in-out whitespace-nowrap 
                                                ${currentTab === item.id 
                                                    ? `border-${item.color}-600 text-${item.color}-600 bg-${item.color}-50` 
                                                    : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`
                                            }
                                        >
                                            {item.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </nav>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow max-w-7xl mx-auto w-full">
                        {renderContent()}
                    </main>

                    {/* Footer - Hiển thị User ID */}
                    <footer className="mt-8 p-4 text-center text-xs text-gray-400 border-t border-gray-200">
                        <p>Mã Ứng Dụng (App ID): <span className="font-mono text-gray-500">{appId}</span></p>
                        {userId && <p>Mã Người Dùng (User ID): <span className="font-mono text-gray-500">{userId}</span></p>}
                        <p>Dữ liệu được lưu trữ riêng tư trên Firestore.</p>
                    </footer>
                </div>
            );
        };

        // Render ứng dụng React
        const container = document.getElementById('root');
        if (container) {
            ReactDOM.createRoot(container).render(<App />);
        }
    </script>
</body>
</html>
